<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Иврит для Wolt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@400;600&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f; --surface:#181818; --surface2:#1e1e1e; --surface3:#252525;
  --border:rgba(255,255,255,0.07); --border-hover:rgba(255,255,255,0.16);
  --text:#f0ede6; --text-muted:#888; --text-dim:#4a4a4a;
  --accent:#009de0; --accent-dim:rgba(0,157,224,0.15);
  --green:#4caf82; --green-dim:rgba(76,175,130,0.12);
  --red:#e05c5c; --red-dim:rgba(224,92,92,0.12);
  --amber:#d4a843; --amber-dim:rgba(212,168,67,0.1);
  --sidebar:230px; --radius:14px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Sora',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;min-height:100dvh;display:flex;flex-direction:row;-webkit-text-size-adjust:100%;}
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--surface2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;height:100dvh;position:sticky;top:0;overflow-y:auto;flex-shrink:0;}
.sidebar-logo{padding:20px 16px 14px;border-bottom:1px solid var(--border);}
.sidebar-logo h1{font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:3px;}
.sidebar-logo p{font-size:11px;color:var(--text-dim);font-weight:300;}
.topic-list{padding:10px 8px;flex:1;}
.topic-btn{display:block;width:100%;text-align:left;padding:9px 10px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text-muted);font-family:'Sora',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:background 0.15s,color 0.15s;line-height:1.4;touch-action:manipulation;margin-bottom:2px;}
.topic-btn:hover{background:var(--surface3);color:var(--text);}
.topic-btn.active{background:var(--accent-dim);color:var(--accent);font-weight:600;}
.topic-btn .t-count{display:block;font-size:10px;color:var(--text-dim);font-weight:400;margin-top:2px;}
.topic-btn.active .t-count{color:var(--accent);opacity:0.7;}
#main{flex:1;display:flex;flex-direction:column;align-items:center;padding:24px 20px 80px;overflow-y:auto;min-width:0;}
.top-bar{width:100%;max-width:500px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:8px;flex-wrap:wrap;}
.topic-title{font-size:13px;font-weight:600;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;}
.dir-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:3px;gap:2px;flex-shrink:0;}
.dir-btn{padding:6px 12px;border-radius:999px;border:none;background:transparent;color:var(--text-muted);font-family:'Sora',sans-serif;font-size:11px;font-weight:500;cursor:pointer;letter-spacing:0.04em;transition:all 0.18s;touch-action:manipulation;white-space:nowrap;}
.dir-btn.active{background:var(--accent);color:#fff;}
.progress-area{width:100%;max-width:500px;margin-bottom:18px;}
.progress-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-bottom:7px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;}
.progress-track{height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:1px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1);}
.card{width:100%;max-width:500px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px 24px 24px;margin-bottom:14px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;position:relative;transition:border-color 0.25s,background 0.25s;}
.card.correct{border-color:var(--green);background:var(--green-dim);}
.card.wrong{border-color:var(--red);background:var(--red-dim);}
.card-label{position:absolute;top:13px;left:16px;font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);}
.review-badge{position:absolute;top:11px;right:14px;font-size:10px;font-weight:500;background:var(--amber-dim);color:var(--amber);border:1px solid rgba(212,168,67,0.2);padding:2px 9px;border-radius:999px;letter-spacing:0.06em;}
.card-prompt{font-size:12px;color:var(--text-dim);margin-bottom:14px;font-weight:400;letter-spacing:0.03em;margin-top:20px;}
.card-word{font-size:26px;font-weight:500;line-height:1.3;color:var(--text);margin-bottom:4px;word-break:break-word;}
.card-word.hebrew{font-family:'Noto Serif Hebrew','Times New Roman',serif;direction:rtl;font-size:32px;font-weight:600;}
.card-sub{font-size:13px;color:var(--text-dim);font-style:italic;margin-top:10px;line-height:1.6;max-width:340px;text-align:center;}
.reveal-box{margin-top:18px;padding:14px 16px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm);width:100%;animation:slideUp 0.22s ease;}
.reveal-area{width:100%;max-width:500px;margin-bottom:10px;animation:slideUp 0.22s ease;}
.reveal-box{padding:14px 16px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm);width:100%;}
@keyframes slideUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.nikud-line{font-family:'Noto Serif Hebrew','Times New Roman',serif;direction:rtl;font-size:22px;color:var(--accent);margin-top:6px;opacity:0.9;animation:slideUp 0.2s ease;font-weight:600;}
.nikud-label{font-size:10px;color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;margin-bottom:10px;}
.conj-table{width:100%;border-collapse:collapse;margin-top:10px;margin-bottom:4px;font-size:13px;}
.conj-table td{padding:4px 6px;text-align:right;vertical-align:middle;}
.conj-table td:first-child{text-align:left;color:var(--text-dim);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;font-family:'Sora',sans-serif;white-space:nowrap;padding-right:12px;}
.conj-table td:last-child{font-family:'Noto Serif Hebrew','Times New Roman',serif;direction:rtl;font-size:16px;color:var(--text);font-weight:600;}
.conj-divider{border:none;border-top:1px solid var(--border);margin:8px 0;}
.ex-he{font-family:'Noto Serif Hebrew','Times New Roman',serif;direction:rtl;font-size:14px;color:var(--text);margin-top:10px;margin-bottom:5px;text-align:right;line-height:1.6;}
.ex-ru{font-size:12px;color:var(--text-muted);font-style:italic;text-align:left;line-height:1.4;}
.input-row{display:flex;gap:8px;margin-bottom:9px;width:100%;max-width:500px;}
input[type="text"]{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Sora',-apple-system,sans-serif;font-size:16px;padding:13px 15px;outline:none;transition:border-color 0.2s;-webkit-appearance:none;appearance:none;}
input[type="text"].he-mode{font-family:'Noto Serif Hebrew','Times New Roman',serif;direction:rtl;font-size:20px;}
input[type="text"]:focus{border-color:var(--border-hover);}
input[type="text"].correct{border-color:var(--green);}
input[type="text"].wrong{border-color:var(--red);}
input[type="text"]::placeholder{color:var(--text-dim);font-size:14px;font-family:'Sora',sans-serif;}
.btn-check{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Sora',sans-serif;font-size:14px;font-weight:600;padding:13px 20px;cursor:pointer;transition:opacity 0.15s,transform 0.1s;white-space:nowrap;touch-action:manipulation;}
.btn-check:hover{opacity:0.85;}
.btn-check:active{transform:scale(0.97);}
.feedback{min-height:20px;font-size:13px;font-weight:500;text-align:center;margin-bottom:7px;transition:color 0.2s;width:100%;max-width:500px;}
.feedback.ok{color:var(--green);}
.feedback.err{color:var(--red);}
.aux-row{display:flex;justify-content:center;gap:4px;width:100%;max-width:500px;}
.aux-btn{background:none;border:none;color:var(--text-dim);font-family:'Sora',sans-serif;font-size:12px;cursor:pointer;padding:9px 13px;border-radius:var(--radius-sm);transition:color 0.15s,background 0.15s;touch-action:manipulation;}
.aux-btn:hover{color:var(--text-muted);background:var(--surface);}
.done-screen{text-align:center;padding:3rem 1rem 2rem;width:100%;max-width:500px;}
.done-screen h2{font-size:24px;font-weight:500;margin-bottom:8px;color:var(--accent);}
.done-screen p{font-size:14px;color:var(--text-muted);margin-bottom:2rem;}
.stats{display:flex;justify-content:center;gap:40px;margin-bottom:2rem;}
.stat-num{font-size:38px;font-weight:600;}
.stat-num.g{color:var(--green);}.stat-num.r{color:var(--red);}
.stat-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;margin-top:3px;}
.done-btns{display:flex;flex-direction:column;gap:10px;align-items:center;}
.btn-restart{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Sora',sans-serif;font-size:13px;font-weight:600;padding:12px 26px;cursor:pointer;transition:opacity 0.15s;}
.btn-restart:hover{opacity:0.85;}
.btn-restart-sec{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-family:'Sora',sans-serif;font-size:13px;padding:12px 26px;cursor:pointer;transition:border-color 0.15s,color 0.15s;}
.btn-restart-sec:hover{border-color:var(--border-hover);color:var(--text);}
.hidden{display:none!important;}

/* ── Sidebar overlay (mobile) ── */
#sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.5);z-index:200;
}

/* ── Floating topics button (mobile only, shown via JS) ── */
#mob-menu-btn{
  display:none;position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%);
  background:var(--accent);color:#fff;border:none;
  border-radius:999px;font-family:'Sora',sans-serif;
  font-size:13px;font-weight:600;padding:12px 26px;
  cursor:pointer;z-index:210;
  box-shadow:0 4px 20px rgba(0,157,224,0.4);
  touch-action:manipulation;white-space:nowrap;
}

@media(max-width:640px){
  body{flex-direction:column;}
  /* sidebar hidden off-screen by default on mobile */
  #sidebar{
    width:100%;min-width:unset;height:auto;
    position:fixed;bottom:0;left:0;right:0;
    border-right:none;border-top:1px solid var(--border);
    z-index:205;max-height:65vh;overflow-y:auto;
    /* hidden state */
    transform:translateY(110%);
    transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
    visibility:hidden;
  }
  #main{padding:16px 14px 100px;}
  .card{padding:28px 16px 20px;}
  .card-word{font-size:22px;}.card-word.hebrew{font-size:28px;}
  .top-bar{margin-bottom:14px;}
}
</style>
</head>
<body>
<nav id="sidebar">
  <div class="sidebar-logo">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div>
        <h1>Иврит — Wolt</h1>
        <p>Флэшкарты по темам</p>
      </div>
      <button id="sidebar-close-btn" onclick="closeSidebar()"
        style="display:none;background:none;border:none;color:var(--text-muted);
               font-size:22px;cursor:pointer;padding:4px 8px;line-height:1;
               touch-action:manipulation;">✕</button>
    </div>
  </div>
  <div class="topic-list" id="topic-list"></div>
</nav>
<div id="main">
  <div class="top-bar">
    <span class="topic-title" id="topic-title">Выбери тему</span>
    <div class="dir-toggle">
      <button class="dir-btn active" id="btn-to-he" onclick="setDir('to-he')">RU → ИВ</button>
      <button class="dir-btn" id="btn-from-he" onclick="setDir('from-he')">ИВ → RU</button>
    </div>
  </div>
  <div class="progress-area">
    <div class="progress-meta">
      <span id="prog-label"></span>
      <span id="prog-score"></span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="card" id="flashcard" style="cursor:default">
    <span class="card-label" id="card-label"></span>
    <span class="review-badge hidden" id="review-badge">повтор</span>
    <p class="card-prompt" id="card-prompt"></p>
    <div class="card-word" id="card-word">👈 Выбери тему</div>
    <div class="card-sub hidden" id="card-sub"></div>
  </div>
  <div class="reveal-area hidden" id="reveal-area">
    <div class="nikud-line hidden" id="nikud-line"></div>
    <div class="nikud-label hidden" id="nikud-label">произношение</div>
    <div class="reveal-box" id="reveal-box">
      <div id="conj-area"></div>
      <hr class="conj-divider" id="conj-divider" style="display:none">
      <div class="ex-he" id="ex-he"></div>
      <div class="ex-ru" id="ex-ru"></div>
    </div>
  </div>
  <div class="input-row">
    <input type="text" id="answer-input" placeholder="" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    <button class="btn-check" id="btn-check" onclick="handleCheck()" style="display:none">Проверить</button>
  </div>
  <div class="feedback hidden" id="feedback"></div>
  <div class="aux-row" style="display:none">
    <button class="aux-btn" onclick="skipCard()">Пропустить →</button>
    <button class="aux-btn" onclick="revealAnswer()">Показать ответ</button>
  </div>
  <div id="done-view" class="done-screen hidden">
    <h2>Раунд завершён!</h2>
    <p id="done-sub"></p>
    <div class="stats">
      <div><div class="stat-num g" id="stat-correct">0</div><div class="stat-label">правильно</div></div>
      <div><div class="stat-num r" id="stat-wrong">0</div><div class="stat-label">ошибки</div></div>
    </div>
    <div class="done-btns">
      <button class="btn-restart" onclick="restart(false)">Повторить ошибки</button>
      <button class="btn-restart-sec" onclick="restart(true)">Перемешать всё снова</button>
    </div>
  </div>
</div>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>
<button id="mob-menu-btn" onclick="toggleSidebar()">☰ Темы</button>
<script>
const TOPICS=[
{id:'receiving',label:'קבלת סחורה',sublabel:'Приём товара',words:[]},
{id:'warehouse',label:'מחסן וסידור',sublabel:'Склад и выкладка',words:[]},
{id:'boxes',label:'קרטונים ואריזות',sublabel:'Коробки и упаковка',words:[]},
{id:'equipment',label:'ציוד ומכשירים',sublabel:'Оборудование',words:[]},
{id:'products',label:'מוצרים וקטגוריות',sublabel:'Товары',words:[]},
{id:'actions',label:'הוראות ופעולות',sublabel:'Инструкции',words:[]},
{id:'problems',label:'בעיות ודיווח',sublabel:'Проблемы',words:[]},
{id:'shifts',label:'משמרת וזמן',sublabel:'Смены и время',words:[]},
{id:'people',label:'אנשים ותקשורת',sublabel:'Люди и общение',words:[]},
{id:'darkstore',label:'דארק סטור',sublabel:'Dark store',words:[]}
];
function T(id){return TOPICS.find(t=>t.id===id);}
T('receiving').words=[
{he:'סחורה',he_nikud:'סְחוֹרָה',ru:'товар',type:'noun',example_he:'הסחורה הגיעה הבוקר.',example_ru:'Товар пришёл сегодня утром.'},
{he:'משלוח',he_nikud:'מִשְׁלוֹחַ',ru:'доставка / поставка',type:'noun',example_he:'המשלוח מאוחר.',example_ru:'Доставка опаздывает.'},
{he:'ספק',he_nikud:'סַפָּק',ru:'поставщик',type:'noun',example_he:'הספק מחכה בחוץ.',example_ru:'Поставщик ждёт снаружи.'},
{he:'נהג',he_nikud:'נַהָג',ru:'водитель',type:'noun',example_he:'הנהג צריך חתימה.',example_ru:'Водителю нужна подпись.'},
{he:'משאית',he_nikud:'מַשָּׂאִית',ru:'грузовик',type:'noun',example_he:'המשאית הגיעה.',example_ru:'Грузовик приехал.'},
{he:'חשבונית',he_nikud:'חֶשְׁבּוֹנִית',ru:'накладная',type:'noun',example_he:'איפה החשבונית?',example_ru:'Где накладная?'},
{he:'תעודת משלוח',he_nikud:'תְּעוּדַת מִשְׁלוֹחַ',ru:'товарная накладная',type:'noun',example_he:'תבדוק את תעודת המשלוח.',example_ru:'Проверь товарную накладную.'},
{he:'לחתום',he_nikud:'לַחְתֹּם',ru:'подписать',type:'verb',forms:{m:'חוֹתֵם',f:'חוֹתֶמֶת',mp:'חוֹתְמִים',fp:'חוֹתְמוֹת'},example_he:'אתה צריך לחתום פה.',example_ru:'Тебе нужно подписать здесь.'},
{he:'חתימה',he_nikud:'חֲתִימָה',ru:'подпись',type:'noun',example_he:'שים חתימה בתחתית.',example_ru:'Поставь подпись внизу.'},
{he:'כמות',he_nikud:'כַּמּוּת',ru:'количество',type:'noun',example_he:'הכמות לא נכונה.',example_ru:'Количество неверное.'},
{he:'לספור',he_nikud:'לִסְפֹּר',ru:'считать / пересчитать',type:'verb',forms:{m:'סוֹפֵר',f:'סוֹפֶרֶת',mp:'סוֹפְרִים',fp:'סוֹפְרוֹת'},example_he:'תספור את הארגזים.',example_ru:'Посчитай ящики.'},
{he:'לבדוק',he_nikud:'לִבְדֹּק',ru:'проверять',type:'verb',forms:{m:'בּוֹדֵק',f:'בּוֹדֶקֶת',mp:'בּוֹדְקִים',fp:'בּוֹדְקוֹת'},example_he:'תבדוק את הסחורה.',example_ru:'Проверь товар.'},
{he:'חסר',he_nikud:'חָסֵר',ru:'не хватает / отсутствует',type:'adj',forms:{m:'חָסֵר',f:'חֲסֵרָה',mp:'חֲסֵרִים',fp:'חֲסֵרוֹת'},example_he:'יש פריט חסר.',example_ru:'Не хватает одной позиции.'},
{he:'פגום',he_nikud:'פָּגוּם',ru:'повреждённый / бракованный',type:'adj',forms:{m:'פָּגוּם',f:'פְּגוּמָה',mp:'פְּגוּמִים',fp:'פְּגוּמוֹת'},example_he:'הארגז פגום.',example_ru:'Ящик повреждён.'},
{he:'לדחות',he_nikud:'לִדְחוֹת',ru:'отклонить / отказать',type:'verb',forms:{m:'דּוֹחֶה',f:'דּוֹחָה',mp:'דּוֹחִים',fp:'דּוֹחוֹת'},example_he:'צריך לדחות את המשלוח.',example_ru:'Нужно отклонить поставку.'},
{he:'לאשר',he_nikud:'לְאַשֵּׁר',ru:'подтвердить / принять',type:'verb',forms:{m:'מְאַשֵּׁר',f:'מְאַשֶּׁרֶת',mp:'מְאַשְּׁרִים',fp:'מְאַשְּׁרוֹת'},example_he:'אני מאשר את הקבלה.',example_ru:'Я подтверждаю приёмку.'},
{he:'פלטה',he_nikud:'פַּלֶּטָה',ru:'паллет',type:'noun',example_he:'יש שתי פלטות.',example_ru:'Есть два паллета.'},
{he:'ארגז',he_nikud:'אַרְגָּז',ru:'ящик / коробка',type:'noun',example_he:'תביא את הארגז.',example_ru:'Принеси ящик.'},

{he:'מיקום על המדף',he_nikud:'מִיקוּם עַל הַמַּדָּף',ru:'расположение на полке',type:'phrase',example_he:'מה המיקום של המוצר הזה על המדף?',example_ru:'Какое расположение этого товара на полке?'},
{he:'להוציא לפועל',he_nikud:'לְהוֹצִיא לַפֹּעַל',ru:'выполнить / осуществить',type:'verb',forms:{m:'מוֹצִיא לַפֹּעַל',f:'מוֹצִיאָה לַפֹּעַל',mp:'מוֹצִיאִים לַפֹּעַל',fp:'מוֹצִיאוֹת לַפֹּעַל'},example_he:'תוציא את התוכנית לפועל.',example_ru:'Выполни план.'}
];// ─── State ────────────────────────────────────────────────────────────────────
let allVocab=[], deck=[], idx=0, dir='to-he', answered=false;
let sessionCorrect=0, sessionWrong=0, currentTopicId=null;

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function buildSidebar(){
  const list=document.getElementById('topic-list');
  list.innerHTML='';
  TOPICS.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='topic-btn'; btn.id='tb-'+t.id;
    btn.onclick=()=>loadTopic(t.id);
    btn.innerHTML='<span>'+t.label+'</span><span class="t-count">'+t.sublabel+' · '+t.words.length+' слов</span>';
    list.appendChild(btn);
  });
  const all=document.createElement('button');
  all.className='topic-btn'; all.id='tb-all';
  all.style.cssText='margin-top:10px;border-top:1px solid rgba(255,255,255,0.07);padding-top:12px;';
  all.onclick=()=>loadTopic('all');
  const total=TOPICS.reduce((a,t)=>a+t.words.length,0);
  all.innerHTML='<span>🔀 Все темы</span><span class="t-count">Все слова · '+total+' слов</span>';
  list.appendChild(all);
}

function loadTopic(id){
  currentTopicId=id;
  document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tb-'+id)?.classList.add('active');
  if(id==='all'){
    allVocab=TOPICS.flatMap(t=>t.words).map(w=>({...w,missCount:0}));
    document.getElementById('topic-title').textContent='Все темы';
  } else {
    const t=TOPICS.find(x=>x.id===id);
    allVocab=t.words.map(w=>({...w,missCount:0}));
    document.getElementById('topic-title').textContent=t.label+' — '+t.sublabel;
  }
  document.getElementById('done-view').classList.add('hidden');
  document.getElementById('flashcard').style.cssText='';
  document.getElementById('btn-check').style.display='';
  document.querySelector('.aux-row').style.display='';
  document.getElementById('feedback').classList.remove('hidden');
  startSession(shuffle(allVocab.map((_,i)=>i)));
  closeSidebar();
}

// ─── Session ──────────────────────────────────────────────────────────────────
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildDeck(indices){
  let d=[];
  indices.forEach(i=>{const r=1+Math.min(allVocab[i].missCount||0,2);for(let x=0;x<r;x++)d.push(i);});
  return shuffle(d);
}

function startSession(indices){
  deck=buildDeck(indices); idx=0; sessionCorrect=0; sessionWrong=0;
  document.getElementById('done-view').classList.add('hidden');
  document.getElementById('flashcard').style.display='';
  showCard();
}

// ─── Card display ─────────────────────────────────────────────────────────────
function showCard(){
  if(idx>=deck.length){showDone();return;}
  answered=false;
  const w=allVocab[deck[idx]];
  const card=document.getElementById('flashcard');
  card.className='card';
  document.getElementById('review-badge').classList.toggle('hidden',(w.missCount||0)===0);
  document.getElementById('reveal-area').classList.add('hidden');
  document.getElementById('nikud-line').classList.add('hidden');
  document.getElementById('nikud-label').classList.add('hidden');
  document.getElementById('card-sub').classList.add('hidden');
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('btn-check').textContent='Проверить';

  const input=document.getElementById('answer-input');
  input.value='';
  input.className=dir==='to-he'?'he-mode':'';
  input.placeholder=dir==='to-he'?'כתוב כאן…':'Напиши по-русски…';

  if(dir==='to-he'){
    document.getElementById('card-label').textContent='русский';
    document.getElementById('card-prompt').textContent='Напиши на иврите:';
    document.getElementById('card-word').textContent=w.ru;
    document.getElementById('card-word').className='card-word';
    const sub=document.getElementById('card-sub');
    sub.textContent='например: '+w.example_ru;
    sub.classList.remove('hidden');
  } else {
    document.getElementById('card-label').textContent='עברית';
    document.getElementById('card-prompt').textContent='Напиши перевод по-русски:';
    document.getElementById('card-word').textContent=w.he;
    document.getElementById('card-word').className='card-word hebrew';
  }
  updateProgress();
  setTimeout(()=>input.focus(),80);
}

function updateProgress(){
  const total=deck.length;
  document.getElementById('prog-fill').style.width=(total?idx/total*100:0)+'%';
  document.getElementById('prog-label').textContent='Карточка '+Math.min(idx+1,total)+' из '+total;
  document.getElementById('prog-score').textContent='✓ '+sessionCorrect+'   ✗ '+sessionWrong;
}

// ─── Conjugation / reveal ─────────────────────────────────────────────────────
function buildConjHTML(w){
  if(!w.forms) return '';
  let rows='';
  if(w.type==='verb'){
    rows=`<tr><td>זכר (הווה)</td><td>${w.forms.m}</td></tr>
<tr><td>נקבה (הווה)</td><td>${w.forms.f}</td></tr>
<tr><td>זכר רבים</td><td>${w.forms.mp}</td></tr>
<tr><td>נקבה רבות</td><td>${w.forms.fp}</td></tr>`;
  } else if(w.type==='adj'){
    rows=`<tr><td>זכר</td><td>${w.forms.m}</td></tr>
<tr><td>נקבה</td><td>${w.forms.f}</td></tr>
<tr><td>זכר רבים</td><td>${w.forms.mp}</td></tr>
<tr><td>נקבה רבות</td><td>${w.forms.fp}</td></tr>`;
  } else if(w.type==='imp'){
    rows=`<tr><td>ציווי זכר</td><td>${w.forms.m}</td></tr>
<tr><td>ציווי נקבה</td><td>${w.forms.f}</td></tr>`;
  }
  return rows?'<table class="conj-table">'+rows+'</table>':'';
}

function showReveal(w){
  if(dir==='to-he' && w.he_nikud){
    document.getElementById('nikud-line').textContent=w.he_nikud;
    document.getElementById('nikud-line').classList.remove('hidden');
    document.getElementById('nikud-label').classList.remove('hidden');
  }
  const conjHTML=buildConjHTML(w);
  document.getElementById('conj-area').innerHTML=conjHTML;
  const divider=document.getElementById('conj-divider');
  divider.style.display=conjHTML?'':'none';
  document.getElementById('ex-he').textContent=w.example_he;
  document.getElementById('ex-ru').textContent=w.example_ru;
  document.getElementById('reveal-area').classList.remove('hidden');
}

// ─── Answer checking ──────────────────────────────────────────────────────────
function normalize(s){return s.replace(/[\u05B0-\u05C7]/g,'').replace(/['".,!?\/]/g,'').trim().toLowerCase();}
function levenshtein(a,b){
  const m=a.length,n=b.length;
  if(!m)return n; if(!n)return m;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>j===0?i:0));
  for(let j=1;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function isMatch(input,target){
  const a=normalize(input), b=normalize(target);
  if(a===b) return true;
  // try each variant split by ' / ' or ' — '
  const variants=b.split(/ \/ | — /).map(v=>v.trim());
  for(const v of variants){
    const dist=levenshtein(a,v);
    if(dist<=Math.max(1,Math.floor(Math.max(a.length,v.length)*0.22))) return true;
  }
  return false;
}

function handleCheck(){
  if(answered){advance();return;}
  const val=document.getElementById('answer-input').value.trim();
  if(!val)return;
  const w=allVocab[deck[idx]];
  const target=dir==='to-he'?w.he:w.ru;
  resolveCard(isMatch(val,target),target,w);
}

function resolveCard(ok,correctAnswer,w){
  answered=true;
  const input=document.getElementById('answer-input');
  const fb=document.getElementById('feedback');
  if(ok){
    input.className=(dir==='to-he'?'he-mode ':'')+'correct';
    fb.textContent='Правильно!'; fb.className='feedback ok';
    document.getElementById('flashcard').className='card correct';
    sessionCorrect++;
  } else {
    input.className=(dir==='to-he'?'he-mode ':'')+'wrong';
    const aHtml=dir==='to-he'
      ?'<span style="font-family:\'Noto Serif Hebrew\',serif;direction:rtl;display:inline-block">'+correctAnswer+'</span>'
      :'<strong>'+correctAnswer+'</strong>';
    fb.innerHTML='Ответ: '+aHtml; fb.className='feedback err';
    document.getElementById('flashcard').className='card wrong';
    allVocab[deck[idx]].missCount=(allVocab[deck[idx]].missCount||0)+1;
    sessionWrong++;
  }
  showReveal(w);
  document.getElementById('btn-check').textContent='Далее →';
  updateProgress();
}

function revealAnswer(){
  if(answered)return;
  const w=allVocab[deck[idx]];
  const target=dir==='to-he'?w.he:w.ru;
  allVocab[deck[idx]].missCount=(allVocab[deck[idx]].missCount||0)+1;
  sessionWrong++;
  answered=true;
  const aHtml=dir==='to-he'
    ?'<span style="font-family:\'Noto Serif Hebrew\',serif;direction:rtl;display:inline-block">'+target+'</span>'
    :'<strong>'+target+'</strong>';
  const fb=document.getElementById('feedback');
  fb.innerHTML='Ответ: '+aHtml; fb.className='feedback err';
  document.getElementById('flashcard').className='card wrong';
  showReveal(w);
  document.getElementById('btn-check').textContent='Далее →';
  updateProgress();
}

function skipCard(){if(answered){advance();return;}idx++;showCard();}
function advance(){idx++;document.getElementById('btn-check').textContent='Проверить';showCard();}

// ─── Done ─────────────────────────────────────────────────────────────────────
function showDone(){
  document.getElementById('done-view').classList.remove('hidden');
  document.getElementById('flashcard').style.display='none';
  document.getElementById('reveal-area').classList.add('hidden');
  document.querySelector('.input-row').style.display='none';
  document.querySelector('.aux-row').style.display='none';
  document.getElementById('feedback').style.display='none';
  document.getElementById('stat-correct').textContent=sessionCorrect;
  document.getElementById('stat-wrong').textContent=sessionWrong;
  const missed=allVocab.filter(v=>(v.missCount||0)>0).length;
  document.getElementById('done-sub').textContent=missed>0
    ?missed+' слов для повторения'
    :'Идеально — ни одной ошибки!';
}

function restart(all){
  document.getElementById('flashcard').style.display='';
  document.getElementById('reveal-area').classList.add('hidden');
  document.querySelector('.input-row').style.display='';
  document.querySelector('.aux-row').style.display='';
  document.getElementById('feedback').style.display='';
  if(all) allVocab.forEach(v=>v.missCount=0);
  const indices=all
    ?allVocab.map((_,i)=>i)
    :allVocab.map((v,i)=>(v.missCount||0)>0?i:-1).filter(i=>i>=0);
  startSession(indices.length===0?allVocab.map((_,i)=>i):indices);
}

// ─── Controls ─────────────────────────────────────────────────────────────────
function setDir(d){
  dir=d;
  document.getElementById('btn-to-he').className='dir-btn'+(d==='to-he'?' active':'');
  document.getElementById('btn-from-he').className='dir-btn'+(d==='from-he'?' active':'');
  if(currentTopicId) showCard();
}
// ─── Sidebar (mobile drawer, always-visible on desktop) ──────────────────────
function isMobile(){ return window.innerWidth <= 640; }

function openSidebar(){
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const btn     = document.getElementById('mob-menu-btn');
  sidebar.style.transform  = 'translateY(0)';
  sidebar.style.visibility = 'visible';
  overlay.style.display    = 'block';
  btn.style.display        = 'none';
}

function closeSidebar(){
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const btn     = document.getElementById('mob-menu-btn');
  if(isMobile()){
    sidebar.style.transform  = 'translateY(110%)';
    sidebar.style.visibility = 'hidden';
    btn.style.display        = 'block';
  }
  overlay.style.display = 'none';
}

function toggleSidebar(){
  const sidebar = document.getElementById('sidebar');
  // visible = transform is translateY(0) or not set (desktop)
  const hidden = sidebar.style.visibility === 'hidden' || sidebar.style.transform === 'translateY(110%)';
  hidden ? openSidebar() : closeSidebar();
}

// Init mobile sidebar state immediately
(function(){
  if(isMobile()){
    const sidebar  = document.getElementById('sidebar');
    const btn      = document.getElementById('mob-menu-btn');
    const closeBtn = document.getElementById('sidebar-close-btn');
    sidebar.style.transform  = 'translateY(110%)';
    sidebar.style.visibility = 'hidden';
    btn.style.display        = 'block';
    if(closeBtn) closeBtn.style.display = 'block';
  }
})();
document.getElementById('answer-input').addEventListener('keydown',e=>{
  if(e.key==='Enter') answered?advance():handleCheck();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
buildSidebar();
document.getElementById('card-word').textContent=
  window.innerWidth<=640 ? '☰ Выбери тему внизу' : '👈 Выбери тему слева';
</script>
